# StoaGraph — the whole product.
#
#   docker compose up
#
# FOUR containers by default, not one. That is the security posture, not a diagram preference.
# (A fifth, the local tool server, is OPT-IN behind the `tools` profile — it mounts a workspace you
#  choose, and there is no sane default for "your project". See local-tools below.)
#
# THREE secrets, and the split is the whole security posture. What matters is that the ORCHESTRATOR —
# which runs untrusted model output — can never approve its own escalations. That requires the token it
# holds to be a DIFFERENT secret from the one that approves. The gate's HTTP role check alone does not
# save you: a compromised orchestrator would not send its token to /approve and accept the 401 — it
# would send whatever approve-capable secret it was holding. So it holds none.
#
# Each service is injected ONLY the secrets it is entitled to. The `environment:` blocks below ARE the
# access-control matrix:
#
#   stag-serve     console (=admin & approve), dispatch   the gate's control plane
#   stag-proxy     dispatch                               it only guards POST /sessions
#   harness-serve  operator, dispatch                     NEVER the console/approve secret. It waits on
#                                                          a human; it can never be one.
#   console        (none at rest)                         the human logs in via a one-click link
#
# The human's login carries TWO role-scoped keys (console + operator) behind one link — they never see
# the seam. Only `dispatch` is machine-only and never leaves a container.
#
# THIS FILE IS PULL-ONLY. It references published, signed images and NOTHING on your disk, so it works
# for someone who has never cloned the repo. Contributors get `compose.override.yml` alongside it, which
# Compose merges automatically and which adds the `build:` blocks — so `docker compose build` still
# builds from source in a clone, and a user's `docker compose up` never tries to build a directory they
# do not have.
#
# Generate the secrets once:  tools/gen-env.sh   (or: stoagraph up)
#
# Pin a version with STOAGRAPH_VERSION=v0.1.0; the default is :latest.

name: stoagraph

services:
  # ---------------------------------------------------------------- THE GATE
  # Deterministic policy, audit, approvals. Holds no model and no API keys — enforced by
  # stoa-kernel/architecture_test.go, which fails the build if a gate package imports orchestrator code.
  stag-serve:
    image: ghcr.io/scanset/stoagraph/stag-serve:${STOAGRAPH_VERSION:-latest}
    command: ["-addr", ":8080", "-tokens", ""] # -tokens "" => env only; no secrets file on disk
    environment:
      # One human key opens the gate. `admin` (author policy) and `approve` (release a held action) are
      # the SAME secret here — both are just "the human". They can be different secrets if you want an
      # operator-vs-approver split; this is the simple default.
      STAG_ADMIN_TOKEN: ${STAG_CONSOLE_TOKEN:?run stoagraph up}
      STAG_APPROVE_TOKEN: ${STAG_CONSOLE_TOKEN:?run stoagraph up}
      STAG_DISPATCH_TOKEN: ${STAG_DISPATCH_TOKEN:?run stoagraph up}
      # externally-reachable base URL for OAuth redirect_uri (override when not on localhost)
      STAG_PUBLIC_URL: ${STAG_PUBLIC_URL:-http://localhost:8080}
    ports: ["8080:8080"]
    volumes:
      # data ONLY. There used to be a `./examples:/app/examples:ro` mount here that nothing read: no
      # code opens /app/examples. In a released install that directory does not exist, so Docker created
      # it — root-owned — in whatever directory the user happened to run `stoagraph up` from. A mount
      # that grants nothing and litters someone's filesystem is worse than no mount.
      - data:/app/data # config DB, the recipe store, the audit logs
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # The MCP gating proxy. Sessions are bound to a recipe HERE, by the trusted dispatcher.
  # It waits for a downstream to be registered rather than crash-looping on a fresh instance.
  stag-proxy:
    image: ghcr.io/scanset/stoagraph/stag-proxy:${STOAGRAPH_VERSION:-latest}
    command: ["-http", ":8091", "-tokens", ""]
    environment:
      STAG_DISPATCH_TOKEN: ${STAG_DISPATCH_TOKEN:?run stoagraph up}
    ports: ["8091:8091"]
    volumes:
      - data:/app/data
    depends_on:
      stag-serve: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8091/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ------------------------------------------------------- THE ORCHESTRATOR
  # This is where the model API KEYS live. Note what it is NOT given below.
  harness-serve:
    image: ghcr.io/scanset/stoagraph/harness-serve:${STOAGRAPH_VERSION:-latest}
    command:
      [
        "-addr",
        ":8090",
        "-tokens",
        "",
        "-approvals-url",
        "http://stag-serve:8080",
        "-daemon-url",
        "http://stag-proxy:8091",
      ]
    # Run as the HOST user so it can read a 0600 config/models.json on a bind mount. (Distroless
    # defaults to uid 65532, which cannot read your private file — the mount preserves host ownership.)
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      # Exactly two secrets, and NEITHER can approve. No console/approve token here — not "unused",
      # ABSENT. This block IS the access-control boundary.
      STAG_DISPATCH_TOKEN: ${STAG_DISPATCH_TOKEN:?run stoagraph up}
      HARNESS_OPERATOR_TOKEN: ${HARNESS_OPERATOR_TOKEN:?run stoagraph up}
      # PREFERRED: keep provider keys OUT of any file. Set `apiKeyEnv` in config/models.json and put
      # the key here (from .env). A mounted secrets file is the thing we are trying to avoid.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # Host port 8092, container port 8090. 8090 is a common default (the OAuth test server wants it),
    # and the orchestrator squatting on it kept colliding. Inside the network it is still :8090.
    ports: ["${HARNESS_HOST_PORT:-8092}:8090"]
    volumes:
      - ./config:/app/config:ro # event_map.json + models.json — the GATE never sees this mount
    depends_on:
      stag-serve: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ------------------------------------------------------------ THE CONSOLE
  # Holds no secret at build or run time. The human logs in via a one-click link (see stoagraph up).
  console:
    image: ghcr.io/scanset/stoagraph/console:${STOAGRAPH_VERSION:-latest}
    ports: ["3000:3000"]
    depends_on: [stag-serve, harness-serve]
    restart: unless-stopped

  # ------------------------------------------------- THE LOCAL TOOL SERVER
  # Real local capability for the agent — search the code, read a file, run the checks — with no shell,
  # ever. Its own container, and that is the point: THE MOUNT IS THE BLAST RADIUS. A tool can only touch
  # what you mount here, so mount the workspace you mean and NOTHING that holds a credential.
  #
  # It holds no gate secret. Note the empty `environment:` — that is deliberate, not an oversight: a
  # process holding STAG_DISPATCH_TOKEN could bind itself a session to ANY recipe, and a tool server is
  # exactly the thing that must not be able to grant itself tools.
  #
  # OPT-IN, and that is not timidity — it is the same principle as the mount. This server exists to run
  # real commands over a directory YOU choose, and there is no sane default for "your project". It used
  # to start by default with the workspace pointed at a path that only exists inside a clone of this
  # repo; for anyone who installed the released binary, Docker created that missing path AS A DIRECTORY,
  # mounted the directory over /app/tools.yaml, and the server crash-looped on `read /app/tools.yaml:
  # is a directory`. A service whose safety story is "you choose the blast radius" must not boot with a
  # blast radius nobody chose.
  #
  # Turn it on when you have said what it may touch:
  #
  #   TOOLS_WORKSPACE=/path/to/your/project \
  #   TOOLS_CONFIG=/path/to/your/tools.yaml \
  #   docker compose --profile tools up -d
  #
  # (examples/local-tools/ in the repo has a tools.yaml to copy.)
  local-tools:
    profiles: ["tools"]
    image: ghcr.io/scanset/stoagraph/local-tools:${STOAGRAPH_VERSION:-latest}
    command: ["-config", "/app/tools.yaml", "-root", "/workspace", "-http", ":9300"]
    volumes:
      # Point TOOLS_WORKSPACE at YOUR project. Read-only: a tool that cannot write cannot corrupt.
      #
      # These defaults only exist inside a CLONE, which is exactly why this service is behind a profile:
      # if it started by default from a released install, Docker would create the missing source path as
      # a DIRECTORY, mount that over /app/tools.yaml, and the server would crash-loop. Enabling the
      # profile without setting both variables walks into the same trap, so set them.
      #
      # (A required-variable guard, ${TOOLS_WORKSPACE:?...}, cannot be used here: compose interpolates
      # before it filters profiles, so it would break `up` for everyone, including people who never
      # wanted this service.)
      - ${TOOLS_WORKSPACE:-./examples/local-tools}:/workspace:ro
      - ${TOOLS_CONFIG:-./examples/local-tools/tools.yaml}:/app/tools.yaml:ro
    environment: {} # NO gate secrets reach a tool server. Deliberately empty.
    read_only: true # the rootfs is immutable; a popped tool has nowhere to persist
    tmpfs: ["/tmp"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:9300/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  data:
