name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # create the GitHub release
  packages: write # push to ghcr.io
  id-token: write # keyless cosign signing (OIDC)
  attestations: write

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # Nothing ships that has not passed the same gate a contributor runs locally.
  check:
    uses: ./.github/workflows/ci.yml

  # Five multi-arch images, signed, with an SBOM attached as an attestation. Five, not four: compose.yml
  # pulls local-tools too, and it was missing here — so a tagged release still could not be run.
  #
  # Signing matters more than usual here: the whole product asks people to move trust from "the model
  # behaved" to "the gate enforced it". That argument collapses if you cannot verify the gate you are
  # running is the gate we published. Keyless cosign means anyone can check, with no key to steal:
  #
  #   cosign verify ghcr.io/scanset/stoagraph/stag-serve:v0.1.0 \
  #     --certificate-identity-regexp 'https://github.com/scanset/stoagraph/.*' \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
  images:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      # One image failing must not CANCEL the other four. With the default (fail-fast: true), a single
      # denied push took the whole matrix down mid-flight and left the registry holding one image out of
      # five — a half-published release, which is worse than a failed one because it looks like it worked.
      fail-fast: false
      matrix:
        include:
          # `target` is load-bearing: with none, Docker builds the LAST stage of the Dockerfile. Every
          # gate image must be `runtime` (distroless). local-tools is the one deliberate exception.
          - { service: stag-serve, cmd: stag-serve, target: runtime, context: ".", file: Dockerfile }
          - { service: stag-proxy, cmd: stag-proxy, target: runtime, context: ".", file: Dockerfile }
          - { service: harness-serve, cmd: harness-serve, target: runtime, context: ".", file: Dockerfile }
          # compose.yml pulls local-tools, so it MUST be published — it was missing from this matrix, so
          # `docker compose up` would have 404'd on it even after a tagged release.
          - { service: local-tools, cmd: stag-tools, target: localtools, context: ".", file: Dockerfile }
          - { service: console, cmd: "", target: "", context: ./frontend, file: ./frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.cmd != '' && format('CMD={0}', matrix.cmd) || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true # BuildKit attaches an SBOM attestation to the image itself
          provenance: mode=max # ...and SLSA provenance: what built this, from which source
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: sign the image (keyless — no key to steal or rotate)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"

  # The installer binary, for people who do not want to build anything. Checksums are published so the
  # one-liner can VERIFY what it downloaded instead of asking you to trust a pipe into your shell.
  #
  # It needs `images`, not just `check`, and that is a correctness requirement rather than tidiness.
  # This job CREATES THE GITHUB RELEASE. When it only waited on `check`, a release could be published —
  # binaries, checksums, signatures, the lot — while the image pushes were failing beside it. That is
  # precisely what happened on v0.1.1: nine assets published, four of five images missing, and
  # `stoagraph up` therefore broken for anyone who trusted the release page. A release must not exist
  # until the artifacts it promises exist.
  cli:
    needs: [check, images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: stoa-kernel/go.mod
          cache-dependency-path: stoa-kernel/go.sum

      - name: build stoagraph for every platform
        working-directory: stoa-kernel
        run: |
          ver="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            out="../dist/stoagraph-$os-$arch"
            [ "$os" = "windows" ] && out="$out.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.Version=$ver" -o "$out" ./cmd/stoagraph
          done
          cd ../dist && sha256sum stoagraph-* > checksums.txt
          cat checksums.txt

      - uses: sigstore/cosign-installer@v3
      - name: sign the checksums (so the installer can verify the whole set from one signature)
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/stoagraph-*
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            compose.yml
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh | sh
            ```

            Prefer to read it first? (You should. We would.)

            ```bash
            curl -sSLO https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/install.sh
            less install.sh && sh install.sh
            ```

            ## Verify what you got

            Every image is signed (keyless cosign) and carries an SBOM + SLSA provenance attestation:

            ```bash
            cosign verify ghcr.io/${{ github.repository }}/stag-serve:${{ github.ref_name }} \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```

            A product that tells you to verify things should make verifying it easy.
