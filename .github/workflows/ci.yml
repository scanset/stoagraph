name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The whole verification gate, exactly as a developer runs it locally: `tools/check.sh`.
  # There is deliberately no separate list of steps here — a CI file that drifts from the local
  # command is a CI file that lies.
  check:
    name: check (fmt · vet · test · ARCHITECTURE · typecheck · hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tools/hygiene.sh inspects the git index; a shallow clone hides tracked files

      - uses: actions/setup-go@v5
        with:
          go-version-file: stoa-kernel/go.mod
          cache-dependency-path: stoa-kernel/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # check.sh skips the frontend typecheck when node_modules is absent. In CI it must actually run.
      - name: install console deps
        working-directory: frontend
        run: npm ci

      - name: check
        run: bash tools/check.sh

  # The architecture rule is the product's central claim ("the gate holds no model and no keys").
  # It is asserted inside check.sh, but it is called out as its own job so a failure is unmissable in
  # the PR checklist: if this is red, the claim is FALSE and the build must not ship.
  architecture:
    name: ARCHITECTURE — the gate must not depend on the orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: stoa-kernel/go.mod
          cache-dependency-path: stoa-kernel/go.sum
      - working-directory: stoa-kernel
        run: go test -v -run TestGate .

  # The images are the artifact people actually run. Build every one of them, so a broken Dockerfile
  # is caught here rather than by the first person who tries `docker compose up`.
  images:
    name: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: build the four Go services + the example downstream
        run: |
          for cmd in stag-serve stag-proxy harness-serve kbserve example-pii; do
            echo "::group::$cmd"
            docker build --build-arg CMD="$cmd" -t "stoagraph-$cmd:ci" .
            echo "::endgroup::"
          done

      - name: build the console
        run: docker build -t stoagraph-console:ci ./frontend

      - name: compose config is valid
        run: |
          # the ${VAR:?} guards make compose refuse to run without real secrets; supply throwaways
          STAG_ADMIN_TOKEN=ci STAG_APPROVE_TOKEN=ci STAG_DISPATCH_TOKEN=ci HARNESS_OPERATOR_TOKEN=ci \
            docker compose config -q

  # The SBOM is regenerated on every push and attached to the run. A stale SBOM is worse than none,
  # because it is believed. It also GATES on copyleft in our own dependency graph: this product is
  # Apache-2.0 and is meant to be embedded by people whose legal teams will not accept a GPL/LGPL
  # obligation. (This check already caught 33MB of LGPL `sharp` being shipped in the console image for
  # a feature the console does not use.)
  sbom:
    name: sbom + licence gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: build the images the SBOM describes
        run: |
          for cmd in stag-serve stag-proxy harness-serve kbserve example-pii; do
            svc="$cmd"; [ "$cmd" = "example-pii" ] && svc="pii-demo"
            docker build --build-arg CMD="$cmd" -t "stoagraph-$svc:latest" .
          done
          docker build -t stoagraph-console:latest ./frontend

      - name: generate the SBOM (fails on copyleft in our dependency graph)
        run: bash tools/sbom.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  # Every commit must carry `Signed-off-by:` (DCO) — the contributor certifying they have the right to
  # submit the patch under Apache-2.0. Cheap to comply with (`git commit -s`), and it keeps the
  # provenance of a SECURITY product's code unambiguous.
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - name: every commit in this PR is signed off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by: .\+ <.\+@.\+>'; then
              echo "::error::commit $sha is missing Signed-off-by (use: git commit -s --amend)"
              fail=1
            fi
          done < <(git rev-list "$base".."$head")
          [ "$fail" -eq 0 ] && echo "all commits signed off"
          exit $fail

