recipe: batch_policy
version: 1
rules:
  action.allowed:
    kind: set_membership
    set: ["restart", "scale"]
steps:
  - id: propose_plan
    kind: propose
    out: plan
  - id: each
    kind: foreach
    in: plan
    as: item
  - id: apply
    kind: sink
    in: item
    field: mcp.exec.action
    sensitivity: authoritative
    rule: action.allowed
    actor: "policy:batch"
