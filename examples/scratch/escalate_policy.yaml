recipe: escalate_policy
version: 1
rules:
  esc.allowed:
    kind: set_membership
    set: ["delete_all", "shutdown"]
steps:
  - id: propose_target
    kind: propose
    out: target
  - id: apply
    kind: sink
    in: target
    field: mcp.escalate.action
    sensitivity: authoritative
    rule: esc.allowed
    actor: "policy:escalation"
  - id: done
    kind: exit
