recipe: k8s_scale_approval_policy
version: 1
# MULTI-ARG + HUMAN-APPROVAL (Stage 5). Route gateArg = "namespace,replicas,approval_token".
# EVERY escalation here is a real approval gate, so everything that lands in the queue is
# genuinely releasable by a signed approval (no dead "approve does nothing" items):
#   dev/staging  <=5  -> auto-apply
#   dev/staging 6..20 -> APPROVAL gate (escalate -> queue; approve -> release)
#   dev/staging  >20  -> deny
#   prod  (any count) -> APPROVAL gate (escalate -> queue; approve -> release)
#   other namespaces  -> deny
# The proxy resolves each signed_equality "$approved" gate to the human-minted token for THIS exact
# action at eval time; the literal placeholder never reaches the kernel (fail-closed). Releases are
# one-time (consumed on use), so a replayed token re-escalates.
rules:
  ns.safe:       {kind: set_membership, set: ["dev", "staging"]}
  ns.prod:       {kind: set_membership, set: ["prod"]}
  scale.auto:    {kind: numeric_range, min: 0, max: 5}
  scale.review:  {kind: numeric_range, min: 6, max: 20}
  scale.prodmax: {kind: numeric_range, min: 0, max: 100}
  approved:      {kind: signed_equality, signed: "$approved"}
steps:
  - {id: propose_ns, kind: propose, out: namespace}
  - {id: propose_count, kind: propose, out: replicas}
  - {id: propose_tok, kind: propose, out: approval_token}
  - id: ns_route
    kind: branch
    in: namespace
    cases:
      - {rule: ns.safe, goto: count_route}
      - {rule: ns.prod, goto: prod_gate}
    default: ns_deny
  # dev / staging: graded by replica count
  - id: count_route
    kind: branch
    in: replicas
    cases:
      - {rule: scale.auto, goto: apply}
      - {rule: scale.review, goto: review_gate}
    default: count_deny
  - {id: apply, kind: sink, in: replicas, field: k8s.scale.apply, sensitivity: authoritative, rule: scale.auto, actor: "policy:platform", goto: exit_ok}
  - {id: exit_ok, kind: exit}
  # dev/staging 6..20: approval gate -> release on a valid signed token, else escalate
  - {id: review_gate, kind: gate, in: approval_token, rule: approved, on_fail: escalate}
  - {id: review_apply, kind: sink, in: replicas, field: k8s.scale.review_apply, sensitivity: authoritative, rule: scale.review, actor: "policy:platform", goto: exit_ra}
  - {id: exit_ra, kind: exit}
  - {id: count_deny, kind: sink, in: replicas, field: k8s.scale.count_blocked, sensitivity: authoritative, rule: scale.auto, actor: "policy:platform", goto: exit_cd}
  - {id: exit_cd, kind: exit}
  # prod: approval gate -> release on a valid signed token, else escalate
  - {id: prod_gate, kind: gate, in: approval_token, rule: approved, on_fail: escalate}
  - {id: prod_apply, kind: sink, in: replicas, field: k8s.scale.prod_apply, sensitivity: authoritative, rule: scale.prodmax, actor: "policy:platform", goto: exit_pa}
  - {id: exit_pa, kind: exit}
  - {id: ns_deny, kind: sink, in: namespace, field: k8s.scale.ns_blocked, sensitivity: authoritative, rule: ns.safe, actor: "policy:platform", goto: exit_nd}
  - {id: exit_nd, kind: exit}
