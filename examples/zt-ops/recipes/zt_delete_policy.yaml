recipe: zt_delete_policy
version: 1
rules:
  delete.blocked:
    kind: set_membership
    set: ["__never__"]
steps:
  - id: propose_uid
    kind: propose
    out: uid
  - id: attempt
    kind: sink
    in: uid
    field: account.delete
    sensitivity: authoritative
    rule: delete.blocked
    actor: "policy:accounts"
