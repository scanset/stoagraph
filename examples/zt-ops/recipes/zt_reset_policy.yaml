recipe: zt_reset_policy
version: 1
rules:
  reset.valid_id:
    kind: numeric_range
    min: 1
    max: 999999
steps:
  - id: propose_uid
    kind: propose
    out: uid
  - id: apply
    kind: sink
    in: uid
    field: account.password_reset
    sensitivity: authoritative
    rule: reset.valid_id
    actor: "policy:accounts"
